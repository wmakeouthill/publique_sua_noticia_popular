name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        env:
          NG_APP_API_URL: ${{ vars.NG_APP_API_URL }}
          NG_APP_GOOGLE_CLIENT_ID: ${{ vars.NG_APP_GOOGLE_CLIENT_ID }}
        run: |
          $repoName = '${{ github.event.repository.name }}'
          $isUserSite = $repoName -eq '${{ github.repository_owner }}.github.io'
          $baseHref = if ($isUserSite) { '/' } else { "/$repoName/" }
          npm run build -- --base-href $baseHref

      - name: Prepare SPA fallback
        shell: pwsh
        run: |
          $browserDir = Join-Path (Resolve-Path 'dist/portal-noticias-ui').Path 'browser'
          Copy-Item (Join-Path $browserDir 'index.html') (Join-Path $browserDir '404.html') -Force

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist/portal-noticias-ui/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
