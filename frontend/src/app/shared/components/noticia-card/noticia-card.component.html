<article class="noticia-card glass-panel" [routerLink]="['/noticia', noticia().id]">
  <div class="card-image-wrapper">
    @if (noticia().imagemUrl) {
      <img [src]="noticia().imagemUrl" [alt]="noticia().titulo" class="card-image" loading="lazy">
    } @else {
      <div class="card-image-placeholder">
        <span>📰</span>
      </div>
    }
    <div class="card-badges">
      <span class="badge" (click)="clicarCategoria($event)">{{ noticia().categoriaId }}</span>
      @if (noticia().status !== 'PUBLICADA') {
        <span class="badge status-badge">{{ statusText }}</span>
      }
    </div>
  </div>

  <div class="card-content">
    <h3 class="card-title">{{ noticia().titulo }}</h3>
    <p class="card-summary">{{ noticia().resumo }}</p>
    
    <div class="card-footer">
      <div class="meta-info">
        <span class="date">{{ noticia().publicadoEm | date:'shortDate' }}</span>
        <span class="views">👁️ {{ noticia().visualizacoes }}</span>
      </div>
    </div>
  </div>
</article>
