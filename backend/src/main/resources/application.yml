server:
  port: 8080

spring:
  application:
    name: portal-noticias

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/noticiapopular}
    username: ${SPRING_DATASOURCE_USERNAME:noticiapopular}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yml
    enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION:3600000}
    refresh-expiration-ms: 604800000
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    base-url: https://generativelanguage.googleapis.com/v1beta
  upload:
    diretorio: ${UPLOAD_DIR:./uploads}
    tamanho-maximo-mb: 10
  cors:
    origens-permitidas: ${CORS_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.noticiapopular: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    liquibase: INFO
